name: NodeSeek 自动签到

on:
  workflow_dispatch:
  schedule:
    - cron: '10 16 * * *'
    - cron: '20 4 * * *'

jobs:
  run-nodeseek-daily:
    runs-on: ubuntu-22.04
    env:
      NS_BROWSER_STATE_DIR: ${{ vars.NS_BROWSER_STATE_DIR || '.browser-state' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore browser state cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.NS_BROWSER_STATE_DIR }}
          key: nodeseek-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            nodeseek-state-${{ runner.os }}-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          scrapling install

      - name: Run NodeSeek script
        env:
          NS_COOKIE: ${{ secrets.NS_COOKIE }}
          NS_RANDOM: ${{ secrets.NS_RANDOM }}
          NS_COMMENT_URL: ${{ secrets.NS_COMMENT_URL }}
          NS_PROXY_URL: ${{ secrets.NS_PROXY_URL }}
          NS_PROXY_INSECURE: ${{ vars.NS_PROXY_INSECURE }}
          NS_USERNAME: ${{ secrets.NS_USERNAME }}
          NS_PASSWORD: ${{ secrets.NS_PASSWORD }}
          NS_EGRESS_MODE: ${{ vars.NS_EGRESS_MODE }}
          NS_CF_WAIT_SECONDS: ${{ vars.NS_CF_WAIT_SECONDS }}
          NS_CF_LOGIN_RETRIES: ${{ vars.NS_CF_LOGIN_RETRIES }}
          NS_SKIP_COMMENTS: ${{ vars.NS_SKIP_COMMENTS }}
          NS_DELAY_MIN: ${{ vars.NS_DELAY_MIN }}
          NS_DELAY_MAX: ${{ vars.NS_DELAY_MAX }}
          NS_HEADLESS: ${{ vars.NS_HEADLESS || 'true' }}
          NS_BROWSER_STATE_DIR: ${{ env.NS_BROWSER_STATE_DIR }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python nodeseek_daily.py

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nodeseek-diagnostics-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            artifacts/**/*.png
            artifacts/**/*.json

      - name: Save browser state cache
        if: always() && hashFiles(format('{0}/.ns_browser_state_ok', env.NS_BROWSER_STATE_DIR)) != ''
        uses: actions/cache/save@v4
        with:
          path: ${{ env.NS_BROWSER_STATE_DIR }}
          key: nodeseek-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
